server:
  http_listen_port: 3200
  log_level: info

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
  ring:
    kvstore:
      store: inmemory

ingester:
  lifecycler:
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 1h
    compaction_window: 1h
  ring:
    kvstore:
      store: inmemory

query_frontend:
  search:
    duration_slo: 5s
  trace_by_id:
    duration_slo: 5s

storage:
  trace:
    backend: s3
    wal:
      path: /var/lib/tempo/wal
    s3:
      bucket: tempo
      endpoint: minio:9000
      access_key: test
      secret_key: test
      insecure: true
      region: east-us